<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoCrow Intelligent Monitoring System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="theme-dark min-h-screen bg-slate-950 text-slate-100">
    <div class="mx-auto max-w-[1800px] p-4 md:p-6">
      <header class="glass rounded-2xl p-4 md:p-6 mb-4 md:mb-6 flex flex-wrap items-center gap-3 justify-between">
        <div>
          <h1 class="text-2xl md:text-3xl font-bold neon">EcoCrow Intelligent Movement Monitoring</h1>
          <p class="text-xs md:text-sm text-slate-300">ESP32 live tracking, anomaly detection, predictive intelligence</p>
        </div>
        <div class="flex flex-wrap items-center gap-2">
          <button id="themeToggle" class="btn">Toggle Theme</button>
          <button id="exportJson" class="btn">Export JSON</button>
          <button id="exportCsv" class="btn">Export CSV</button>
        </div>
      </header>

      <main class="grid grid-cols-1 xl:grid-cols-12 gap-4">
        <section class="xl:col-span-8">
          <div class="glass rounded-2xl p-3 md:p-4">
            <div class="flex flex-wrap gap-2 justify-between items-center mb-3">
              <div class="text-sm text-slate-300">Click map to add geofence zones</div>
              <div class="flex items-center gap-2 flex-wrap">
                <select id="trackerSelect" class="select"></select>
                <input id="newTrackerId" class="select w-36" placeholder="crow-03" />
                <button id="addTrackerBtn" class="btn">Add Tracker</button>
              </div>
            </div>
            <div id="map" class="rounded-xl"></div>
          </div>
          <div class="glass rounded-2xl p-3 md:p-4 mt-4">
            <h2 class="font-semibold mb-2">Timeline Playback</h2>
            <div class="flex flex-wrap gap-2 items-center">
              <button id="playBtn" class="btn">Play</button>
              <button id="pauseBtn" class="btn">Pause</button>
              <button id="rewindBtn" class="btn">Rewind</button>
              <button id="ffBtn" class="btn">Fast-Forward</button>
              <input id="timelineRange" type="range" min="0" max="100" value="100" class="w-full md:flex-1 accent-cyan-400" />
            </div>
          </div>
        </section>

        <aside class="xl:col-span-4 space-y-4">
          <section class="glass rounded-2xl p-4">
            <h2 class="font-semibold mb-2">Real-Time Statistics</h2>
            <div id="statsPanel" class="grid grid-cols-2 gap-2 text-sm"></div>
          </section>

          <section class="glass rounded-2xl p-4">
            <h2 class="font-semibold mb-2">Zone Manager</h2>
            <div class="grid grid-cols-2 gap-2 mb-3">
              <input id="zoneName" class="select" placeholder="Zone name" value="Zone 1" />
              <input id="zoneRadius" class="select" type="number" min="50" step="10" value="300" />
              <select id="zoneRisk" class="select col-span-2">
                <option value="low">low</option>
                <option value="medium" selected>medium</option>
                <option value="high">high</option>
                <option value="restricted">restricted</option>
              </select>
              <button id="zoneArmBtn" class="btn col-span-2">Enable Zone Marking</button>
              <button id="removeLastZoneBtn" class="btn">Remove Last Zone</button>
              <button id="clearZonesBtn" class="btn">Clear All Zones</button>
            </div>
            <div id="zoneList" class="space-y-2 max-h-48 overflow-auto text-sm"></div>
          </section>

          <section class="glass rounded-2xl p-4">
            <h2 class="font-semibold mb-2">Tracker Status</h2>
            <div class="grid grid-cols-2 gap-2 mb-3">
              <button id="toggleTrackingBtn" class="btn">Stop Selected</button>
              <button id="deleteTrackerBtn" class="btn">Delete Selected</button>
            </div>
            <div id="trackerStatus" class="space-y-2 text-sm"></div>
          </section>
        </aside>
      </main>

      <section class="grid grid-cols-1 lg:grid-cols-2 gap-4 mt-4">
        <div class="glass rounded-2xl p-4"><canvas id="distanceChart"></canvas></div>
        <div class="glass rounded-2xl p-4"><canvas id="speedChart"></canvas></div>
        <div class="glass rounded-2xl p-4"><canvas id="zoneVisitChart"></canvas></div>
        <div class="glass rounded-2xl p-4"><canvas id="anomalyChart"></canvas></div>
      </section>
    </div>

    <div id="alertPanel" class="fixed right-4 bottom-4 z-[999] w-[92vw] md:w-96 space-y-2"></div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
